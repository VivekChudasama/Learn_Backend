<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop</title>
    <style>
        body {
            padding: 0;
            margin: 0;
            font-family: sans-serif;
        }

        main {
            padding: 1rem
        }

        .mainHeader {
            width: 100%;
            height: 3.5rem;
            background-color: #dbc441;
        }

        .mainHeaderNav {
            height: 100%;
            display: flex;
            align-items: center;
        }

        .mainHeaderItemList {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        .mainHeaderItem {
            margin: 0 1rem;
            padding: 0;
        }

        .mainHeaderItem a {
            text-decoration: none;
            color: black;
        }

        .mainHeaderItem a:hover,
        .mainHeaderItem a:active,
        .mainHeaderItem a.active {
            color: #3e00a1;
        }
    </style>
</head>

<body>
    <header class="mainHeader">
        <nav class="mainHeaderNav">
            <ul class="mainHeaderItemList">
                <li class="mainHeaderItem"><a class="active" href="/">Shop</a></li>
                <li class="mainHeaderItem"><a href="/admin/add-product">Add product</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>My Products</h1>
        <p>List of all products..</p>
    </main>
</body>

</html>
